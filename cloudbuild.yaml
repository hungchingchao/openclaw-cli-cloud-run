# 映像名稱
images:
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/openclaw-cli:${SHORT_SHA}'
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/openclaw-cli:latest'

# 構建選項
options:
  machineType: 'E2_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY

# 替換變數（可在 Cloud Build 觸發器中設置）
substitutions:
  _REGION: 'asia-east1'
  _ARTIFACT_REPO: 'cloud-run-source-deploy'
  _SHELL_PASSWORD: 'changeme'

# 構建超時（1 小時）
timeout: '3600s'

# 標籤
tags:
  - 'openclaw-cli'
  - 'cloud-run'
  - 'gcp-cloud-build'
